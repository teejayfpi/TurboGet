name: Build Desktop Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Enable desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: turboget-windows
          path: build/windows/runner/Release/
          retention-days: 30

  build-macos:
    name: Build macOS
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Enable desktop
        run: flutter config --enable-macos-desktop

      - name: Create Podfile with deployment target
        run: |
          cat > macos/Podfile << 'EOF'
          platform :osx, '10.15'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'
          project 'Runner', {
            'Debug' => {:build_type => 'Debug'},
            'Profile' => {:build_type => 'Profile'},
            'Release' => {:build_type => 'Release'},
          }
          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'ephemeral', 'Config', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first."
            end
            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}"
          end
          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)
          flutter_macos_podfile_setup
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_macos_pods File.dirname(File.realpath(__FILE__))
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_macos_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['MACOSX_DEPLOYMENT_TARGET'] = '10.15'
              end
            end
          end
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: turboget-macos
          path: build/macos/Build/Products/Release/
          retention-days: 30

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Enable desktop
        run: flutter config --enable-linux-desktop

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: turboget-linux
          path: build/linux/release/bundle/
          retention-days: 30

  release:
    name: Create Desktop Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: turboget-windows
          path: release/windows

      - name: Download macOS
        uses: actions/download-artifact@v4
        with:
          name: turboget-macos
          path: release/macos

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: turboget-linux
          path: release/linux

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          files: |
            release/windows/*
            release/macos/*
            release/linux/*
          tag_name: desktop-v${{ github.run_number }}
          name: TurboGet Desktop v${{ github.run_number }}
          body: |
            ## TurboGet Desktop App
            
            Download the appropriate version for your platform:
            - **Windows**: Use the `.exe` file in the `windows` folder
            - **macOS**: Use the `.app` bundle in the `macos` folder
            - **Linux**: Use the executable in the `linux` folder
            
            ---
            Built automatically from main branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
