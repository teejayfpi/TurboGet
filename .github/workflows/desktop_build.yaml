name: Build Desktop Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Enable desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: turboget-windows
          path: build/windows/runner/Release
          retention-days: 30
          if-no-files-found: error

  # macOS build is skipped due to CocoaPods dependency issues with wakelock_plus
  # The package requires macOS 10.15+ but the CI environment has configuration issues
  # To build macOS locally, ensure you have Xcode and CocoaPods installed

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Enable desktop
        run: flutter config --enable-linux-desktop

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: turboget-linux
          path: build/linux/release/bundle
          retention-days: 30
          if-no-files-found: error

  release:
    name: Create Desktop Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: turboget-windows
          path: release/windows

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: turboget-linux
          path: release/linux

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          files: |
            release/windows/*
            release/linux/*
          tag_name: desktop-v${{ github.run_number }}
          name: TurboGet Desktop v${{ github.run_number }}
          body: |
            ## TurboGet Desktop App
            
            Download the appropriate version for your platform:
            - **Windows**: Use the `.exe` file in the `windows` folder
            - **Linux**: Use the executable in the `linux` folder
            
            ---
            Built automatically from main branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
