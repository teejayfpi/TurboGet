version: '3.8'

services:
  turboget-backend:
    build: .
    container_name: turboget-backend
    ports:
      - "8000:8000"
    volumes:
      - ./downloads:/app/downloads
      - ./temp:/app/temp
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
